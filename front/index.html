<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Список дел</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div id="authScreen" class="screen active">
      <div class="tabs">
        <button id="showLoginTab" class="tab-btn active">Вход</button>
        <button id="showRegisterTab" class="tab-btn">Регистрация</button>
      </div>

      <form id="loginForm" class="auth-form active">
        <h2>Вход в аккаунт</h2>
        <div class="form-group">
          <label for="loginUsername">Имя пользователя</label>
          <input type="text" id="loginUsername" required minlength="3">
        </div>
        <div class="form-group">
          <label for="loginPassword">Пароль</label>
          <input type="password" id="loginPassword" required minlength="6">
        </div>
        <button type="submit" class="btn primary">Войти</button>
        <div id="loginError" class="error-message"></div>
      </form>

      <form id="registerForm" class="auth-form">
        <h2>Регистрация</h2>
        <div class="form-group">
          <label for="registerUsername">Имя пользователя</label>
          <input type="text" id="registerUsername" required minlength="3">
        </div>
        <div class="form-group">
          <label for="registerPassword">Пароль</label>
          <input type="password" id="registerPassword" required minlength="6">
        </div>
        <button type="submit" class="btn primary">Зарегистрироваться</button>
        <div id="registerError" class="error-message"></div>
      </form>
    </div>

    <div id="tasksScreen" class="screen">
      <header>
        <h1>Мои задачи</h1>
        <div class="user-info">
          <span id="userNameDisplay"></span>
          <button id="logoutBtn" class="btn secondary">Выйти</button>
        </div>
      </header>

      <form id="addTaskForm" class="add-task-form">
        <input type="text" id="taskTitle" placeholder="Что нужно сделать?" required minlength="1">
        <button type="submit" class="btn primary">Добавить</button>
      </form>

      <div id="tasksList" class="tasks-list"></div>
      <div id="tasksError" class="error-message"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
